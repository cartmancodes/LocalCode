services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orchestrator
    ports:
      # Host port remapped to 5433 to avoid clashing with a local Postgres on 5432.
      # Containers in this network still reach Postgres at postgres:5432.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

# OpenCode is no longer a docker service — it runs on the host so its
# `opencode auth login` browser flow works and OAuth tokens persist at
# ~/.local/share/opencode/. setup.sh installs it and starts `opencode serve`
# as a backgrounded host process.

volumes:
  pgdata:
