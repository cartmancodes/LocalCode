# LiteLLM proxy config — single source of truth for which models the orchestrator can call.
# Both Claude Code (via ANTHROPIC_BASE_URL) and OpenCode (via @ai-sdk/openai-compatible)
# connect through this proxy so that budgets, rate limits, and logs apply uniformly.

model_list:
  # ── Anthropic (cloud) ────────────────────────────────────────────────────────
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-opus-4-7
    litellm_params:
      model: anthropic/claude-opus-4-7
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY

  # ── OpenAI (cloud) ───────────────────────────────────────────────────────────
  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  # ── Local via Ollama ─────────────────────────────────────────────────────────
  # Pull the model first: `ollama pull llama3.1` and `ollama pull qwen2.5-coder:7b`
  - model_name: llama3.1-local
    litellm_params:
      model: ollama_chat/llama3.1
      api_base: os.environ/OLLAMA_API_BASE

  - model_name: qwen2.5-coder-local
    litellm_params:
      model: ollama_chat/qwen2.5-coder:7b
      api_base: os.environ/OLLAMA_API_BASE

litellm_settings:
  drop_params: true
  set_verbose: false
  # Persist spend logs in the same Postgres so the budget bar can query them.
  store_model_in_db: true
  # Cache identical prompts for 5 minutes to dampen accidental loops.
  cache: true
  cache_params:
    type: local
    ttl: 300

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  # Enforce per-key budgets — virtual keys minted via /key/generate inherit max_budget.
  enforce_user_param: false
  # Default budget cadence resets daily.
  budget_duration: 1d
